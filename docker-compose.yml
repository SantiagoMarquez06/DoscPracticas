services:
  backend:
    build:
      context: ./herramientas-node-api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: herramientas-api
    expose:
      - "3000"
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-tienda}
      DB_USER: ${DB_USER:?Set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DIALECT: ${DB_DIALECT:-mssql}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
      DB_INSTANCE: ${DB_INSTANCE:-}
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-false}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or Coolify variables}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - herramientas-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: herramientas-frontend
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - herramientas-network
    restart: unless-stopped

networks:
  herramientas-network:
    name: ${COMPOSE_PROJECT_NAME:-herramientas-network}
