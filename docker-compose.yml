services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${MSSQL_PID:-Express}
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env or Coolify variables}
    expose:
      - "1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - herramientas-network
    restart: unless-stopped

  backend:
    build:
      context: ./herramientas-node-api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-sqlserver}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-tienda}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DIALECT: ${DB_DIALECT:-mssql}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
      DB_INSTANCE: ${DB_INSTANCE:-}
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-false}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or Coolify variables}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      - sqlserver
    networks:
      - herramientas-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - herramientas-network
    restart: unless-stopped

volumes:
  sqlserver-data:

networks:
  herramientas-network:
